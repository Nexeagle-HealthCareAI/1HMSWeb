<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <link rel="icon" href="/Images/77834bc6-d9bc-41d2-8676-026af7cf79bc.png" type="image/png" />
    <script>
      // Initialize theme system
      const theme = localStorage.getItem('theme-storage') ? 
        JSON.parse(localStorage.getItem('theme-storage')).state.mode : 'light';
      
      // Apply theme immediately to prevent flash
      if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = 'dark';
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.style.colorScheme = 'light';
      }
      

    </script>
    <title>NexEagle HMS</title>
    <meta name="description" content="NexEagle HMS - Healthcare Management System" />
    <meta name="author" content="NexEagle" />
    <meta property="og:title" content="NexEagle HMS" />
    <meta property="og:description" content="NexEagle HMS - Healthcare Management System" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/Images/77834bc6-d9bc-41d2-8676-026af7cf79bc.png" />
    <meta property="og:url" content="https://nexeagle.com" />
    <meta property="og:site_name" content="NexEagle" />
    <meta property="og:locale" content="en_US" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>

  </body>
</html>
