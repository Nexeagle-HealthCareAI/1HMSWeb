# ═══════════════════════════════════════════════════════════════════════════════
# EASYHMS WEB — CI/CD Pipeline  (React/Vite SPA → nginx container on GHCR)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   Stage 1 — Build       npm ci + production build (validation, also runs on PRs)
#   Stage 2 — Deploy Dev  build image (VITE_API_BASE_URL = Dev API) → run on Dev VM  (develop)
#   Stage 3 — Deploy Prod build image (VITE_API_BASE_URL = Prod API) → run on Prod VM (main)
#
# The SPA is served by nginx INSIDE the container; the container's port 80 is
# published on host port 81 (the host's :80 is left untouched, matching the prior setup).
#
# VITE_API_BASE_URL is baked into the bundle at BUILD time, so dev and prod images
# are built separately, each pointed at its own API. The SPA calls the API directly
# (CORS is AllowAnyOrigin) — its routes live at the root (/auth, /health, /doctors),
# NOT under /api, so no reverse proxy is needed.
#
# Pushing to GHCR uses the built-in GITHUB_TOKEN (no GHCR_TOKEN secret needed); that
# same token pulls the image on the VM during deploy.
#
# ─────────────────────────────────────────────────────────────────────────────
# SECRETS (already set):
#   DEV_SSH_HOST 151.185.45.77 | DEV_SSH_USER root | DEV_SSH_PASSWORD
#   PROD_SSH_HOST 151.185.45.67 | PROD_SSH_USER root | PROD_SSH_KEY_B64
# OPTIONAL repo VARIABLES (Settings → Variables) to override the API URL the SPA calls:
#   DEV_API_BASE_URL   default http://151.185.45.77:5001
#   PROD_API_BASE_URL  default http://151.185.45.67:5001
# ═══════════════════════════════════════════════════════════════════════════════

name: EasyHMS Web — CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: easyhms-web-cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Stage 1 — Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Production build (validation)
        run: npm run build:prod

# ═══════════════════════════════════════════════════════════════════════════════
  deploy-dev:
    name: "Stage 2 — Deploy → Dev"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image vars
        id: vars
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/easyhms-web" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.DEV_API_BASE_URL || 'http://151.185.45.77:5001' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Dev VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          password: ${{ secrets.DEV_SSH_PASSWORD }}
          port: 22
          command_timeout: 10m
          envs: IMAGE,PULL_TOKEN,ACTOR
          script: |
            set -e
            echo "$PULL_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
            docker pull "$IMAGE"
            docker rm -f easyhms-web-dev 2>/dev/null || true
            docker run -d --name easyhms-web-dev --restart unless-stopped \
              -p 81:80 "$IMAGE"
            docker image prune -f || true

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            S=$(curl -s -o /dev/null -w '%{http_code}' http://${{ secrets.DEV_SSH_HOST }}:81/healthz 2>/dev/null || echo 000)
            echo "Attempt $i — HTTP $S"
            [ "$S" = "200" ] && echo "✅ EasyHMS Web is up" && exit 0
            sleep 5
          done
          echo "⚠️ Health check inconclusive — check: docker logs easyhms-web-dev"
          exit 0

# ═══════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: "Stage 3 — Deploy → Prod"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image vars
        id: vars
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/easyhms-web" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.PROD_API_BASE_URL || 'https://1hms-api.nexeagle.com' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to Prod App VM
        env:
          IMAGE: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
              "echo '$PULL_TOKEN' | docker login ghcr.io -u '$ACTOR' --password-stdin && \
               docker pull '$IMAGE' && docker rm -f easyhms-web-prod 2>/dev/null; \
               docker run -d --name easyhms-web-prod --restart unless-stopped -p 81:80 '$IMAGE' && \
               docker image prune -f"

      - name: Health check
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            S=$(curl -s -o /dev/null -w '%{http_code}' http://${{ secrets.PROD_SSH_HOST }}:81/healthz 2>/dev/null || echo 000)
            echo "Attempt $i — HTTP $S"
            [ "$S" = "200" ] && echo "✅ EasyHMS Web (Prod) is up" && exit 0
            sleep 5
          done
          echo "⚠️ Health check inconclusive — check: docker logs easyhms-web-prod"
          exit 0

      - name: Write summary
        if: always()
        run: |
          echo "## 🌐 EasyHMS Web — Prod" >> $GITHUB_STEP_SUMMARY
          [ "${{ job.status }}" = "success" ] \
            && echo "**Status:** ✅ Deployed to http://${{ secrets.PROD_SSH_HOST }}:81" >> $GITHUB_STEP_SUMMARY \
            || echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
