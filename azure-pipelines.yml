# azure-pipelines-swa.yml
trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  appLocation: '.'   # if your Vite app is in a subfolder, e.g. 'site'
  buildDir: 'dist'   # Vite output

stages:
# ============ DEV (build + deploy) ============
- stage: Deploy_Dev
  displayName: Deploy to Dev
  variables:
  - group: swa-secrets-dev   # contains: SWA_DEPLOYMENT_TOKEN_WEB_DEV
  jobs:
  - job: Dev
    displayName: Build & Deploy (Dev)
    steps:
    - checkout: self

    - task: UseNode@1
      displayName: 'Use Node.js 22'
      inputs:
        version: '22.x'

    - script: |
        set -e
        cd "$(Build.SourcesDirectory)/$(appLocation)"
        npm ci
        npm run build:dev
      displayName: 'Install & Build (Vite Dev)'

    # Point SWA task directly to the built folder; no artifacts needed
    - task: AzureStaticWebApp@0
      displayName: 'Deploy to Azure Static Web App (Dev)'
      inputs:
        app_location: '$(appLocation)/$(buildDir)'  # upload built files only
        api_location: ''                            # no API
        output_location: ''                         # empty since app_location IS the output
        skip_app_build: true
        azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN_WEB_DEV)

# ============ QA (build + deploy) ============
- stage: Deploy_QA
  displayName: Deploy to QA
  dependsOn: Deploy_Dev
  condition: succeeded()
  variables:
  - group: swa-secrets-qa    # contains: SWA_DEPLOYMENT_TOKEN_WEB_QA
  jobs:
  - job: QA
    displayName: Build & Deploy (QA)
    steps:
    - checkout: self

    - task: UseNode@1
      displayName: 'Use Node.js 22'
      inputs:
        version: '22.x'

    - script: |
        set -e
        cd "$(Build.SourcesDirectory)/$(appLocation)"
        npm ci
        npx vite build --mode qa
      displayName: 'Install & Build (Vite QA)'

    - task: AzureStaticWebApp@0
      displayName: 'Deploy to Azure Static Web App (QA)'
      inputs:
        app_location: '$(appLocation)/$(buildDir)'
        api_location: ''
        output_location: ''
        skip_app_build: true
        azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN_WEB_QA)
