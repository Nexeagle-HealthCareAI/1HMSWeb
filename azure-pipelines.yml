# azure-pipelines-swa.yml
trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

# ---- runtime knobs for PROD ----
parameters:
- name: deployProd
  type: boolean
  default: false          # set true at queue time to enable Prod stage
- name: prodReleaseDateIst
  type: string
  default: ''             # e.g. '2025-12-05 21:30:00' (IST, 24h, no timezone suffix)

variables:
  appLocation: '.'        # if your Vite app is in a subfolder, e.g. 'site'
  buildDir: 'dist'        # Vite output

stages:
# ============ DEV (build + deploy) ============
- stage: Deploy_Dev
  displayName: Deploy to Dev
  variables:
  - group: swa-secrets-dev   # SWA_DEPLOYMENT_TOKEN_WEB_DEV, VITE_API_BASE_URL
  jobs:
  - job: Dev
    displayName: Deploy (Dev) via SWA build
    steps:
    - checkout: self

    - task: AzureStaticWebApp@0
      displayName: 'Deploy to Azure Static Web App (Dev)'
      inputs:
        app_location: '$(appLocation)'
        api_location: ''
        output_location: '$(buildDir)'
        skip_app_build: false
        azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN_WEB_DEV)
      env:
        VITE_API_BASE_URL: $(VITE_API_BASE_URL)

# ============ QA (build + deploy) ============
- stage: Deploy_QA
  displayName: Deploy to QA
  dependsOn: Deploy_Dev
  condition: succeeded()
  variables:
  - group: swa-secrets-qa    # SWA_DEPLOYMENT_TOKEN_WEB_QA, VITE_API_BASE_URL
  jobs:
  - job: QA
    displayName: Deploy (QA) via SWA build
    steps:
    - checkout: self

    - task: AzureStaticWebApp@0
      displayName: 'Deploy to Azure Static Web App (QA)'
      inputs:
        app_location: '$(appLocation)'
        api_location: ''
        output_location: '$(buildDir)'
        skip_app_build: false
        azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN_WEB_QA)
      env:
        VITE_API_BASE_URL: $(VITE_API_BASE_URL)

# ============ PROD (time-gated + approval) ============
- stage: Deploy_Prod
  displayName: Deploy to Prod
  dependsOn: Deploy_QA
  condition: and(succeeded(), eq('${{ parameters.deployProd }}', 'true'))
  variables:
  - group: swa-secrets-prod  # SWA_DEPLOYMENT_TOKEN_WEB_PROD, VITE_API_BASE_URL
  jobs:
  - deployment: Prod
    displayName: Deploy (Prod) via SWA build
    environment: 'prod'      # Configure approvals in Pipelines → Environments → prod
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          # Time gate: wait until prodReleaseDateIst (IST) if provided
          - bash: |
              set -euo pipefail
              REL="${PROD_DATE}"
              if [ -z "${REL}" ]; then
                echo "No prodReleaseDateIst provided. Proceeding without time gate."
                exit 0
              fi
              if ! TARGET_EPOCH=$(TZ='Asia/Kolkata' date -d "${REL}" +%s 2>/dev/null); then
                echo "Invalid prodReleaseDateIst. Use 'YYYY-MM-DD HH:MM:SS' in IST."
                exit 1
              fi
              NOW=$(date -u +%s)
              if [ "$NOW" -ge "$TARGET_EPOCH" ]; then
                echo "Release time reached. Continuing."
                exit 0
              fi
              LEFT=$(( TARGET_EPOCH - NOW ))
              echo "Waiting until ${REL} IST (~${LEFT}s)..."
              while [ $LEFT -gt 0 ]; do
                S=$(( LEFT>60 ? 60 : LEFT ))
                sleep $S
                NOW=$(date -u +%s)
                LEFT=$(( TARGET_EPOCH - NOW ))
                echo "…${LEFT}s remaining"
              done
              echo "Time gate passed."
            displayName: "Time gate (IST)"
            env:
              PROD_DATE: ${{ parameters.prodReleaseDateIst }}

          # (Optional) Manual check inside the deployment job (in addition to Environment approval)
          - task: ManualValidation@0
            displayName: "Manual approval (final check)"
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: ''
              instructions: |
                Approve Prod SWA deploy.
                Branch: $(Build.SourceBranch)
                Commit: $(Build.SourceVersion)
                Scheduled IST: ${{ parameters.prodReleaseDateIst }}
              onTimeout: 'reject'

          - task: AzureStaticWebApp@0
            displayName: 'Deploy to Azure Static Web App (Prod)'
            inputs:
              app_location: '$(appLocation)'
              api_location: ''
              output_location: '$(buildDir)'
              skip_app_build: false
              azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN_WEB_PROD)
            env:
              VITE_API_BASE_URL: $(VITE_API_BASE_URL)
