trigger:
  - main
  - Release

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildDir: 'dist'  # Vite outputs to dist

steps:
  - task: UseNode@1
    inputs:
      version: '22.x'
    displayName: 'Use Node.js 22'

  - script: |
      npm ci
    displayName: 'Install dependencies'

  - script: |
      npx vite build
    displayName: 'Build app using Vite'

  - task: CopyFiles@2
    inputs:
      SourceFolder: '$(buildDir)'  # <- 'dist'
      Contents: '**'
      TargetFolder: '$(Build.ArtifactStagingDirectory)'
    displayName: 'Copy built files to staging'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'drop'
      publishLocation: 'Container'
    displayName: 'Publish build artifacts'

  - task: AzureWebApp@1
    inputs:
      azureSubscription: 'AzureConnection-EasyHMS'
      appType: 'webAppLinux'
      appName: 'easyHMSWeb'
      package: '$(Build.ArtifactStagingDirectory)'
    displayName: 'Deploy to Azure App Service'
