# azure-pipelines-swa.yml
trigger:
  - main

pool:
  vmImage: ubuntu-latest

# If your app is in a subfolder (e.g., 'web'), set appLocation: 'web' (no leading slash)
variables:
  appLocation: ''      # '' = repo root
  outLocation: 'dist'  # Vite default

stages:
# ===================== DEPLOY DEV (build + deploy) =====================
- stage: Deploy_Dev
  displayName: Deploy to Dev (build each time)
  variables:
  - group: swa-secrets-dev   # must contain SWA_DEPLOYMENT_TOKEN_WEB_DEV
  jobs:
  - deployment: DeployDev
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node.js 22.x
            inputs:
              versionSpec: '22.x'

          - task: Cache@2
            displayName: Cache npm
            inputs:
              key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(appLocation)/package-lock.json'
              path: '$(Pipeline.Workspace)/.npm'

          - script: |
              set -e
              cd "$(Build.SourcesDirectory)/$(appLocation)"
              npm ci --cache "$(Pipeline.Workspace)/.npm" --prefer-offline
              npm run build
            displayName: Install & Build (DEV)

          # We already built → just upload the built folder
          - task: AzureStaticWebApp@0
            displayName: SWA Deploy (Dev)
            inputs:
              app_location: '$(appLocation)'       # relative to repo root mounted at /working_dir
              api_location: ''                     # no API
              output_location: '$(outLocation)'    # upload this folder
              skip_app_build: true                 # don't rebuild in the SWA task
              azure_static_web_apps_api_token: '$(SWA_DEPLOYMENT_TOKEN_WEB_DEV)'

# ===================== DEPLOY QA (build + deploy) ======================
- stage: Deploy_QA
  displayName: Deploy to QA (build each time)
  dependsOn: Deploy_Dev
  condition: succeeded()
  variables:
  - group: swa-secrets-qa    # must contain SWA_DEPLOYMENT_TOKEN_WEB_QA
  jobs:
  - deployment: DeployQA
    environment: qa          # add approvals on this Environment if desired
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node.js 22.x
            inputs:
              versionSpec: '22.x'

          - task: Cache@2
            displayName: Cache npm
            inputs:
              key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(appLocation)/package-lock.json'
              path: '$(Pipeline.Workspace)/.npm'

          - script: |
              set -e
              cd "$(Build.SourcesDirectory)/$(appLocation)"
              npm ci --cache "$(Pipeline.Workspace)/.npm" --prefer-offline
              npm run build
            displayName: Install & Build (QA)

          - task: AzureStaticWebApp@0
            displayName: SWA Deploy (QA)
            inputs:
              app_location: '$(appLocation)'
              api_location: ''
              output_location: '$(outLocation)'
              skip_app_build: true
              azure_static_web_apps_api_token: '$(SWA_DEPLOYMENT_TOKEN_WEB_QA)'
