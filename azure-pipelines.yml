# azure-pipelines-swa.yml
trigger:
  branches:
    include: [ main ]

pool:
  vmImage: ubuntu-latest

# Change these if your app isn't at repo root
# If your React/Vite app is in a subfolder (e.g., /web), set appLocation: 'web'
variables:
  appLocation: ''      # '' means repo root; NO leading slash
  outLocation: 'dist'  # Vite default. For CRA use 'build'

stages:
# ===================== BUILD ONCE =====================
- stage: Build
  displayName: Build
  jobs:
  - job: BuildJob
    displayName: Build React (Vite)
    steps:
    - task: NodeTool@0
      displayName: Use Node 20.x
      inputs:
        versionSpec: '20.x'

    - task: Cache@2
      displayName: Cache npm
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        path: '$(Pipeline.Workspace)/.npm'

    - script: |
        set -e
        cd "$(Build.SourcesDirectory)/$(appLocation)"
        npm ci --cache "$(Pipeline.Workspace)/.npm" --prefer-offline
        npm run build
      displayName: Install & Build

    # Publish the entire repo (includes <appLocation>/<outLocation>)
    - publish: $(Build.SourcesDirectory)
      artifact: webdrop
      displayName: Publish artifact (webdrop)

# ===================== DEPLOY DEV =====================
- stage: Deploy_Dev
  displayName: Deploy to Dev
  dependsOn: Build
  variables:
  - group: swa-secrets-dev   # must contain SWA_DEPLOYMENT_TOKEN_WEB_DEV
  jobs:
  - deployment: DeployDev
    environment: dev         # add checks/approvals if you want
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: webdrop

          # Sanity check paths as seen by the SWA task container
          - script: |
              echo "PWD: $(pwd)"
              echo "== listing =="
              ls -la
              echo "== webdrop =="
              ls -la webdrop || true
              echo "== app root =="
              ls -la "webdrop/$(appLocation)" || true
              echo "== build output =="
              ls -la "webdrop/$(appLocation)/$(outLocation)" || true
            displayName: Inspect artifact paths (Dev)

          - task: AzureStaticWebApp@0
            displayName: SWA Deploy (Dev)
            inputs:
              # IMPORTANT: use RELATIVE paths. The task mounts its own working dir.
              app_location: 'webdrop/$(appLocation)'
              output_location: '$(outLocation)'
              skip_app_build: true
              azure_static_web_apps_api_token: '$(SWA_DEPLOYMENT_TOKEN_WEB_DEV)'

# ===================== DEPLOY QA ======================
- stage: Deploy_QA
  displayName: Deploy to QA
  dependsOn: Deploy_Dev
  condition: succeeded()
  variables:
  - group: swa-secrets-qa    # must contain SWA_DEPLOYMENT_TOKEN_WEB_QA
  jobs:
  - deployment: DeployQA
    environment: qa          # configure approvals on this Environment if desired
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: webdrop

          - script: |
              echo "PWD: $(pwd)"
              echo "== listing =="
              ls -la
              echo "== webdrop =="
              ls -la webdrop || true
              echo "== app root =="
              ls -la "webdrop/$(appLocation)" || true
              echo "== build output =="
              ls -la "webdrop/$(appLocation)/$(outLocation)" || true
            displayName: Inspect artifact paths (QA)

          - task: AzureStaticWebApp@0
            displayName: SWA Deploy (QA)
            inputs:
              app_location: 'webdrop/$(appLocation)'
              output_location: '$(outLocation)'
              skip_app_build: true
              azure_static_web_apps_api_token: '$(SWA_DEPLOYMENT_TOKEN_WEB_QA)'
