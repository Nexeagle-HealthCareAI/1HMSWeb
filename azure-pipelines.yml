# azure-pipelines-swa.yml
trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

# Change these if your app lives in a subfolder or uses CRA
variables:
  appLocation: ''     # '' = repo root; or 'web' if your app is in /web
  buildDir: 'dist'    # Vite builds to 'dist' by default

stages:
# ===================== DEPLOY DEV (build + deploy) =====================
- stage: Deploy_Dev
  displayName: Deploy to Dev (build each time)
  variables:
  - group: swa-secrets-dev   # must contain: SWA_DEPLOYMENT_TOKEN_WEB_DEV
  jobs:
  - job: DevJob
    displayName: Build & Deploy (Dev)
    steps:
    - task: UseNode@1
      inputs:
        version: '22.x'
      displayName: 'Use Node.js 22'

    - script: |
        set -e
        cd "$(Build.SourcesDirectory)/$(appLocation)"
        npm ci
        npx vite build
      displayName: 'Install & Build (Vite)'

    # Ensure config travels with the built files when we skip SWA build
    - bash: |
        set -e
        SRC_ROOT="$(Build.SourcesDirectory)/$(appLocation)"
        OUT_DIR="$(Build.SourcesDirectory)/$(appLocation)/$(buildDir)"
        # copy config if present in app root
        [ -f "$SRC_ROOT/staticwebapp.config.json" ] && cp "$SRC_ROOT/staticwebapp.config.json" "$OUT_DIR/" || true
        echo "Prepared output folder:"
        ls -la "$OUT_DIR" || true
      displayName: 'Prepare build output (copy SWA config if any)'

    - task: AzureStaticWebApp@0
      displayName: 'Deploy to Azure Static Web App (Dev)'
      inputs:
        # Upload ONLY the built folder by pointing app_location to app root and output_location to 'dist'
        app_location: '$(appLocation)'
        api_location: ''
        output_location: '$(buildDir)'
        skip_app_build: true
        azure_static_web_apps_api_token: '$(SWA_DEPLOYMENT_TOKEN_WEB_DEV)'

# ===================== DEPLOY QA (build + deploy) ======================
- stage: Deploy_QA
  displayName: Deploy to QA (build each time)
  dependsOn: Deploy_Dev
  condition: succeeded()
  variables:
  - group: swa-secrets-qa    # must contain: SWA_DEPLOYMENT_TOKEN_WEB_QA
  jobs:
  - job: QaJob
    displayName: Build & Deploy (QA)
    steps:
    - task: UseNode@1
      inputs:
        version: '22.x'
      displayName: 'Use Node.js 22'

    - script: |
        set -e
        cd "$(Build.SourcesDirectory)/$(appLocation)"
        npm ci
        npx vite build
      displayName: 'Install & Build (Vite)'

    - bash: |
        set -e
        SRC_ROOT="$(Build.SourcesDirectory)/$(appLocation)"
        OUT_DIR="$(Build.SourcesDirectory)/$(appLocation)/$(buildDir)"
        [ -f "$SRC_ROOT/staticwebapp.config.json" ] && cp "$SRC_ROOT/staticwebapp.config.json" "$OUT_DIR/" || true
        echo "Prepared output folder:"
        ls -la "$OUT_DIR" || true
      displayName: 'Prepare build output (copy SWA config if any)'

    - task: AzureStaticWebApp@0
      displayName: 'Deploy to Azure Static Web App (QA)'
      inputs:
        app_location: '$(appLocation)'
        api_location: ''
        output_location: '$(buildDir)'
        skip_app_build: true
        azure_static_web_apps_api_token: '$(SWA_DEPLOYMENT_TOKEN_WEB_QA)'
